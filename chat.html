<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Чат</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ✅ HEADER */
    .chat-header {
      padding: 15px;
      background: #111827;
      border-bottom: 1px solid #1e293b;
      font-size: 18px;
    }

    /* ✅ MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 12px;
      word-wrap: break-word;
    }

    .mine {
      background: #16a34a;
      align-self: flex-end;
      text-align: right;
    }

    .other {
      background: #1e293b;
      align-self: flex-start;
    }

    /* ✅ INPUT */
    .chat-input {
      display: flex;
      padding: 10px;
      border-top: 1px solid #1e293b;
      background: #0f172a;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #1e293b;
      color: white;
      outline: none;
    }

    .chat-input button {
      margin-left: 10px;
      padding: 10px 15px;
      background: #16a34a;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- ✅ HEADER -->
<div class="chat-header">
  💬 Чат з продавцем
</div>

<!-- ✅ MESSAGES -->
<div id="messages"></div>

<!-- ✅ INPUT -->
<div class="chat-input">
  <input id="msg" placeholder="Написати...">
  <button onclick="send()">Відправити</button>
</div>

<script type="module" src="chat.js"></script>

</body>
</html>

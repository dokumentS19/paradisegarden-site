<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Обʼєкт нерухомості — АН «Райський Сад»</title>

  <link rel="stylesheet" href="../styles.css">

  <style>
    .object-shell {
      max-width: 1180px;
      margin: 22px auto;
      padding: 0 14px;
    }

    .object-page {
      display: grid;
      gap: 18px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      text-decoration: none;
      color: #bbf7d0;
      margin-bottom: 4px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.24);
      font-size: 13px;
      transition: 0.25s ease;
    }

    .back-link:hover {
      background: rgba(34, 197, 94, 0.22);
      transform: translateY(-1px);
    }

    .object-hero-card {
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(24, 34, 52, 0.96), rgba(11, 18, 32, 0.96));
      border: 1px solid rgba(148, 163, 184, 0.20);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
    }

    .object-title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 16px;
    }

    .object-title-row h1 {
      margin: 7px 0 0;
      font-size: clamp(24px, 2.4vw, 34px);
      line-height: 1.08;
      letter-spacing: -0.4px;
      font-weight: 800;
    }

    .object-hero-card .section-label {
      font-size: 11px;
      padding: 6px 11px;
      letter-spacing: 0.03em;
    }

    .object-price {
      color: #22c55e;
      font-size: clamp(22px, 2.3vw, 32px);
      font-weight: 900;
      white-space: nowrap;
      line-height: 1;
      padding-top: 8px;
      text-align: right;
    }

    .status-line {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.13);
      border: 1px solid rgba(34, 197, 94, 0.26);
      color: #bbf7d0;
      font-size: 12px;
      line-height: 1.2;
    }

    .gallery {
      display: grid;
      gap: 12px;
    }

    .gallery-main {
      position: relative;
      width: 100%;
      height: clamp(330px, 48vw, 560px);
      border-radius: 20px;
      overflow: hidden;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.20);
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      user-select: none;
    }

    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(2, 6, 23, 0.62);
      color: white;
      font-size: 26px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .gallery-btn:hover {
      background: rgba(34, 197, 94, 0.62);
      transform: translateY(-50%) scale(1.06);
    }

    .gallery-btn.left {
      left: 12px;
    }

    .gallery-btn.right {
      right: 12px;
    }

    .counter {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      background: rgba(2, 6, 23, 0.72);
      color: white;
      padding: 6px 12px;
      border-radius: 999px;
      backdrop-filter: blur(12px);
      font-size: 12px;
    }

    .thumbs {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 4px 2px 8px;
    }

    .thumbs img {
      width: 98px;
      height: 68px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.72;
      transition: 0.25s ease;
      flex: 0 0 auto;
      background: #020617;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: #22c55e;
      transform: translateY(-2px);
    }

    .object-info-grid {
      display: grid;
      grid-template-columns: 1.18fr 0.82fr;
      gap: 20px;
    }

    .object-box {
      background:
        linear-gradient(180deg, rgba(24, 34, 52, 0.96), rgba(11, 18, 32, 0.96));
      border: 1px solid rgba(148, 163, 184, 0.20);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.25);
    }

    .object-box h2,
    .object-box h3 {
      margin-top: 0;
    }

    .object-box h2 {
      font-size: 24px;
    }

    .object-box h3 {
      font-size: 18px;
    }

    .object-description {
      color: #e2e8f0;
      line-height: 1.7;
      white-space: pre-line;
      font-size: 15px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .feature {
      background: rgba(15, 23, 42, 0.80);
      border: 1px solid rgba(148, 163, 184, 0.17);
      border-radius: 14px;
      padding: 12px;
    }

    .feature small {
      display: block;
      color: #94a3b8;
      margin-bottom: 5px;
      font-size: 12px;
    }

    .feature strong {
      color: white;
      font-size: 15px;
      line-height: 1.25;
    }

    .seller-card {
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.16), transparent 36%),
        rgba(11, 18, 32, 0.96);
      border: 1px solid rgba(34, 197, 94, 0.22);
      border-radius: 20px;
      padding: 20px;
    }

    .seller-card h3 {
      margin-top: 0;
      font-size: 21px;
    }

    .seller-card p {
      color: #dbeafe;
      line-height: 1.6;
      font-size: 15px;
    }

    .seller-actions {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }

    .seller-actions button,
    .seller-actions a {
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    .map-box {
      height: 320px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #020617;
    }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .similar-card {
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .similar-card:hover {
      transform: translateY(-5px);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .similar-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .similar-card div {
      padding: 12px;
    }

    @media (max-width: 950px) {
      .object-title-row,
      .object-info-grid {
        grid-template-columns: 1fr;
      }

      .object-price {
        text-align: left;
        white-space: normal;
        padding-top: 0;
      }

      .gallery-main {
        height: 410px;
      }
    }

    @media (max-width: 620px) {
      .object-shell {
        margin: 14px auto;
        padding: 0 10px;
      }

      .object-hero-card,
      .object-box,
      .seller-card {
        padding: 14px;
        border-radius: 16px;
      }

      .object-title-row h1 {
        font-size: 24px;
      }

      .object-price {
        font-size: 22px;
      }

      .pill {
        font-size: 11px;
        padding: 5px 8px;
      }

      .gallery-main {
        height: 300px;
        border-radius: 16px;
      }

      .gallery-btn {
        width: 38px;
        height: 38px;
        font-size: 24px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      .thumbs img {
        width: 88px;
        height: 62px;
      }
    }
  </style>
</head>

<body>

<header class="topbar">
  <a href="../index.html" class="brand">
    <span class="brand-icon">🌿</span>
    <span>
      <strong>Райський Сад</strong>
      <small>Обʼєкт нерухомості</small>
    </span>
  </a>

  <nav class="nav">
    <a href="../index.html">🏠 Головна</a>
    <a href="../favorites.html">❤️ Обране</a>
    <a href="../dashboard.html">👤 Кабінет</a>
    <a href="../admin.html">⚙️ Адмін</a>
  </nav>
</header>

<main class="object-shell">
  <div id="objectPage" class="object-page">
    <section class="object-hero-card">
      <p>Завантаження обʼєкта...</p>
    </section>
  </div>
</main>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCrWP2WuQloBOErhfB4zrh1GWgd90BCI2I"></script>
<script type="module" src="object.js"></script>

</body>
</html>

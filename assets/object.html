<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Об'єкт</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    .back {
      display: inline-block;
      margin-bottom: 10px;
      color: #22c55e;
      text-decoration: none;
    }

    .seller {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-top: 15px;
    }

    .seller strong {
      display: block;
      margin-bottom: 5px;
    }

    #similar {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    #similar a {
      background: #1e293b;
      padding: 8px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
    }

    #similar img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="objectPage"></div>

<!-- ✅ Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCrWP2WuQIoB0ErhfB4zrh1GWgd90BCI2I"></script>

<!-- ✅ Твій JS -->
<script type="module" src="assets/object.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Обʼєкт нерухомості — АН «Райський Сад»</title>

  <link rel="stylesheet" href="../styles.css">

  <style>
    .object-shell {
      max-width: 1250px;
      margin: 2px auto;
      padding: 0 2px;
    }

    .object-page {
      display: grid;
      gap: 10px;
    }

    .object-hero-card {
      background:
        linear-gradient(180deg, rgba(28, 34, 59, 0.94), rgba(12, 20, 38, 0.94));
      border: 1px solid rgba(128, 143, 164, 0.22);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.34);
    }

    .object-title-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

   .object-title-row h1 {
  margin: 6px 0 0;
  font-size: clamp(14px, 1.6vw, 22px);
  line-height: 1.08;
    }

   .object-price {
  color: #22c55e;
 font-size: clamp(10px, 1.0vw, 12px)
  font-weight: 700;
  white-space: nowrap;
}
    .status-line {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

 .pill {
  display: inline-flex9px;  display: inline-flex;
  border-radius: 999px;
  background: rgba(34, 197, 94, 0.14);
  border: 1px solid rgba(34, 197, 94, 0.28);
  color: #bbf7d0;
  font-size: 10px;
}
    .gallery {
      display: grid;
      gap: 10px;
    }

    .gallery-main {
      position: relative;
      width: 100%;
      height: clamp(320px, 48vw, 560px);
      border-radius: 16px;
      overflow: hidden;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.22);
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      user-select: none;
    }

    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(2, 6, 23, 0.62);
      color: white;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: 0.25s ease;
    }

    .gallery-btn:hover {
      background: rgba(34, 197, 94, 0.6);
      transform: translateY(-50%) scale(1.08);
    }

    .gallery-btn.left {
      left: 8px;
    }

    .gallery-btn.right {
      right: 12px;
    }

    .counter {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      background: rgba(2, 6, 23, 0.7);
      color: white;
      padding: 5px 11px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
      font-size: 8px;
    }

    .thumbs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 2px 8px;
    }

    .thumbs img {
      width: 105px;
      height: 76px;
      object-fit: cover;
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.72;
      transition: 0.25s ease;
      flex: 0 0 auto;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: #22c55e;
      transform: translateY(-2px);
    }

    .object-info-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 12px;
    }

    .object-box {
      background:
        linear-gradient(180deg, rgba(30, 41, 59, 0.94), rgba(15, 23, 42, 0.94));
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.28);
    }

    .object-box h2,
    .object-box h3 {
      margin-top: 0;
    }

    .object-description {
      color: #e2e8f0;
      line-height: 1.6;
      white-space: pre-line;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .feature {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 10px;
      padding:10px;
    }

    .feature small {
      display: block;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .feature strong {
      color: white;
      font-size: 12px;
    }

    .seller-card {
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.18), transparent 38%),
        rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(34, 197, 94, 0.24);
      border-radius: 10px;
      padding: 10px;
    }

    .seller-card h3 {
      margin-top: 0;
    }

    .seller-actions {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .seller-actions button,
    .seller-actions a {
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    .map-box {
      height: 220px;
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #020617;
    }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 10px;
    }

    .similar-card {
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .similar-card:hover {
      transform: translateY(-5px);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .similar-card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }

    .similar-card div {
      padding: 8px;
    }

    .back-link {
      display: inline-flex;
      text-decoration: none;
      color: #bbf7d0;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.24);
    }

    @media (max-width: 950px) {
      .object-title-row,
      .object-info-grid {
        grid-template-columns: 1fr;
        display: grid;
      }

      .object-price {
        white-space: normal;
      }

      .gallery-main {
        height: 220px;
      }
    }

    @media (max-width: 620px) {
      .object-hero-card,
      .object-box,
      .seller-card {
        padding: 10px;
        border-radius: 10px;
      }

      
      .object-title-row h1 {
       font-size: 10px;
        }
     
    .object-price {
      font-size: 10px;
     }
      .gallery-main {
        height: 300px;
        border-radius: 18px;
      }

      .gallery-btn {
        width: 24px;
        height:  24px;
        font-size:12px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

    </span>
  </a>

  <nav class="nav">

  </nav>
</header>

<main class="object-shell">
  <div id="objectPage" class="object-page">
    <section class="object-hero-card">
      <p>Завантаження обʼєкта...</p>
    </section>
  </div>
</main>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCrWP2WuQloBOErhfB4zrh1GWgd90BCI2I"></script>

</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Обʼєкт нерухомості — АН «Райський Сад»</title>

  <link rel="stylesheet" href="../styles.css">

  <style>
    .object-shell {
      max-width: 1120px;
      margin: 8px auto 24px;
      padding: 0 14px;
      display: grid;
      gap: 14px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      text-decoration: none;
      color: #fff3df;
      margin: 0 0 2px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(8, 21, 15, 0.82);
      border: 1px solid rgba(232, 137, 18, 0.24);
      font-size: 13px;
      line-height: 1.1;
      transition: 0.25s ease;
    }

    .back-link:hover {
      background: rgba(149, 87, 31, 0.28);
      transform: translateY(-1px);
    }

    .object-hero-card {
      background:
        linear-gradient(180deg, rgba(20, 35, 30, 0.96), rgba(13, 25, 22, 0.96));
      border: 1px solid rgba(232, 137, 18, 0.20);
      border-radius: 18px;
      padding: 12px;
      overflow: hidden;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
    }

    .object-title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 10px;
    }

    .object-title-row > div {
      min-width: 0;
    }

    .object-hero-card .section-label {
      font-size: 10px;
      padding: 5px 9px;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .object-title-row h1 {
      margin: 8px 0 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .object-price {
      color: #ffffff;
      font-size: clamp(18px, 2.2vw, 26px);
      font-weight: 850;
      white-space: nowrap;
      line-height: 1;
      padding: 11px 14px;
      border-radius: 14px;
      background: linear-gradient(135deg, #e88912, #95571f);
      border: 1px solid rgba(232, 137, 18, 0.32);
      text-align: right;
      box-shadow: 0 12px 28px rgba(149, 87, 31, 0.26);
    }

    .status-line {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(149, 87, 31, 0.30);
      border: 1px solid rgba(232, 137, 18, 0.30);
      color: #fff3df;
      font-size: 12px;
      line-height: 1.1;
    }

    .gallery {
      display: grid;
      gap: 8px;
    }

    .gallery-main {
      position: relative;
      width: 100%;
      height: clamp(320px, 42vw, 520px);
      border-radius: 16px;
      overflow: hidden;
      background: #08150f;
      border: 1px solid rgba(232, 137, 18, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-main::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--gallery-bg);
      background-size: cover;
      background-position: center;
      filter: blur(18px);
      transform: scale(1.12);
      opacity: 0.22;
      z-index: 1;
    }

    .gallery-main::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(4, 20, 13, 0.38);
      z-index: 2;
      pointer-events: none;
    }

    .gallery-main img {
      position: relative;
      z-index: 3;
      display: block;
      user-select: none;
    }

    .gallery-main img.horizontal,
    .gallery-main img.vertical {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center center;
    }

    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 30;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(4, 20, 13, 0.76);
      color: white;
      font-size: 24px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .gallery-btn:hover {
      background: rgba(232, 137, 18, 0.72);
      transform: translateY(-50%) scale(1.06);
    }

    .gallery-btn.left {
      left: 12px;
    }

    .gallery-btn.right {
      right: 12px;
    }

    .counter {
      position: absolute;
      z-index: 30;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      background: rgba(4, 20, 13, 0.82);
      color: white;
      padding: 6px 10px;
      border-radius: 999px;
      backdrop-filter: blur(12px);
      font-size: 12px;
      border: 1px solid rgba(232, 137, 18, 0.20);
    }

    .thumbs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 2px 6px;
      background: transparent;
    }

    .thumbs img {
      width: 82px;
      height: 56px;
      object-fit: cover;
      border-radius: 9px;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.72;
      transition: 0.25s ease;
      flex: 0 0 auto;
      background: #08150f;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: #e88912;
      transform: translateY(-2px);
    }

    .object-info-grid {
      display: grid;
      grid-template-columns: 1.18fr 0.82fr;
      gap: 16px;
      margin-top: 4px;
    }

    .object-box {
      background:
        linear-gradient(180deg, rgba(20, 35, 30, 0.96), rgba(13, 25, 22, 0.96));
      border: 1px solid rgba(232, 137, 18, 0.18);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
    }

    .object-box h2,
    .object-box h3 {
      margin-top: 0;
    }

    .object-box h2 {
      font-size: 22px;
    }

    .object-box h3 {
      font-size: 18px;
    }

    .object-description {
      color: #dbeafe;
      line-height: 1.65;
      white-space: pre-line;
      font-size: 15px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .feature {
      background: rgba(8, 21, 15, 0.78);
      border: 1px solid rgba(232, 137, 18, 0.16);
      border-radius: 13px;
      padding: 12px;
    }

    .feature small {
      display: block;
      color: #94a3b8;
      margin-bottom: 5px;
      font-size: 12px;
    }

    .feature strong {
      color: white;
      font-size: 15px;
      line-height: 1.25;
    }

    .seller-card {
      background:
        radial-gradient(circle at top right, rgba(232, 137, 18, 0.13), transparent 36%),
        rgba(13, 25, 22, 0.96);
      border: 1px solid rgba(232, 137, 18, 0.20);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
    }

    .seller-card h3 {
      margin-top: 0;
      font-size: 20px;
    }

    .seller-card p {
      color: #dbeafe;
      line-height: 1.6;
      font-size: 15px;
    }

    .seller-actions {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }

    .seller-actions button,
    .seller-actions a {
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    .map-box {
      height: 300px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(232, 137, 18, 0.20);
      background: #08150f;
    }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .similar-card {
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(8, 21, 15, 0.86);
      border: 1px solid rgba(232, 137, 18, 0.18);
      border-radius: 16px;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .similar-card:hover {
      transform: translateY(-5px);
      border-color: rgba(232, 137, 18, 0.46);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
    }

    .similar-card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
    }

    .similar-card div {
      padding: 12px;
    }

    .similar-card p {
      color: #dbeafe;
      margin: 6px 0;
    }

    @media (max-width: 950px) {
      .object-info-grid {
        grid-template-columns: 1fr;
      }

      .object-title-row {
        grid-template-columns: 1fr;
      }

      .object-price {
        width: fit-content;
        text-align: left;
      }

      .gallery-main {
        height: 44vh;
        min-height: 300px;
      }
    }

    @media (max-width: 620px) {
      .object-shell {
        margin: 8px auto 18px;
        padding: 0 10px;
      }

      .object-title-row h1 {
        font-size: 22px;
      }

      .object-price {
        width: fit-content;
        font-size: 18px;
        text-align: left;
      }

      .gallery-main {
        height: 38vh;
        min-height: 250px;
        border-radius: 14px;
      }

      .gallery-btn {
        width: 34px;
        height: 34px;
        font-size: 22px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      .thumbs img {
        width: 72px;
        height: 48px;
      }

      .object-box,
      .seller-card {
        padding: 15px;
        border-radius: 16px;
      }
    }
 /* ================================

  }

  }
  }
  </style>
</head>

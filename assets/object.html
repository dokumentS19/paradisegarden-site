<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Обʼєкт нерухомості — АН «Райський Сад»</title>

  <link rel="stylesheet" href="../styles.css">

  <style>
    .object-shell {
      max-width: 1120px;
      margin display: grid;      margin: 2px auto 24px;
      gap: 6px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      text-decoration: none;
      color: #d1fae5;
      margin: 0 0 4px;
      padding: 5px 11px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.26);
      font-size: 12px;
      line-height: 1.1;
      transition: 0.25s ease;
    }

    .back-link:hover {
      background: rgba(30, 41, 59, 0.95);
      transform: translateY(-1px);
    }

    .object-hero-card {
      background:
        linear-gradient(180deg, rgba(24, 34, 52, 0.96), rgba(11, 18, 32, 0.96));
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      padding: 7px;
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.26);
    }

    .object-title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
      margin-bottom: 5px;
    }

    .object-title-row > div {
      min-width: 0;
    }

    .object-hero-card .section-label {
      font-size: 7.5px;
      padding: 3px 6px;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .object-title-row h1 {
      margin: 3px 0 0;
      font-size: clamp(13px, 1.05vw, 16px);
      line-height: 1.12;
      font-weight: 650;
      letter-spacing: -0.05px;
    }

    .object-price {
      color: #4ade80;
      font-size: clamp(13px, 1.05vw, 16px);
      font-weight: 750;
      white-space: nowrap;
      line-height: 1;
      padding: 5px 9px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.72);
      border: 1px solid rgba(74, 222, 128, 0.26);
      text-align: right;
    }

    .status-line {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 5px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.14);
      border: 1px solid rgba(34, 197, 94, 0.26);
      color: #bbf7d0;
      font-size: 8.5px;
      line-height: 1.1;
    }

    .gallery {
      display: grid;
      gap: 4px;
    }

    .gallery-main {
      position: relative;
      width: 100%;
     height: clamp(280px, 35vw, 420px);
      border-radius: 13px;
      overflow: hidden;
      background: #111827;
      border: 1px solid rgba(148, 163, 184, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-main::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--gallery-bg);
      background-size: cover;
      background-position: center;
      filter: blur(24px);
      transform: scale(1.08);
      opacity: 0.26;
      z-index: 1;
    }

    .gallery-main::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.28);
      z-index: 2;
      pointer-events: none;
    }

    .gallery-main img {
      position: relative;
      z-index: 3;
      display: block;
      user-select: none;
    }

    .gallery-main img.horizontal {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    .gallery-main img.vertical {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center center;
    }

    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 30;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(15, 23, 42, 0.72);
      color: white;
      font-size: 19px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .gallery-btn:hover {
      background: rgba(34, 197, 94, 0.68);
      transform: translateY(-50%) scale(1.06);
    }

    .gallery-btn.left {
      left: 9px;
    }

    .gallery-btn.right {
      right: 9px;
    }

    .counter {
      position: absolute;
      z-index: 30;
      left: 50%;
      bottom: 7px;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.78);
      color: white;
      padding: 4px 8px;
      border-radius: 999px;
      backdrop-filter: blur(12px);
      font-size: 10px;
    }

    .thumbs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 3px 2px 6px;
      background: transparent;
    }

    .thumbs img {
      width: 70px;
      height: 46px;
      object-fit: cover;
      border-radius: 7px;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.72;
      transition: 0.25s ease;
      flex: 0 0 auto;
      background: #1f2937;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: #22c55e;
      transform: translateY(-2px);
    }

    .object-info-grid {
      display: grid;
      grid-template-columns: 1.18fr 0.82fr;
      gap: 16px;
      margin-top: 14px;
    }

    .object-box {
      background:
        linear-gradient(180deg, rgba(24, 34, 52, 0.96), rgba(11, 18, 32, 0.96));
      border: 1px solid rgba(148, 163, 184, 0.20);
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
    }

    .object-box h2,
    .object-box h3 {
      margin-top: 0;
    }

    .object-box h2 {
      font-size: 19px;
    }

    .object-box h3 {
      font-size: 16px;
    }

    .object-description {
      color: #e2e8f0;
      line-height: 1.6;
      white-space: pre-line;
      font-size: 14px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .feature {
      background: rgba(15, 23, 42, 0.80);
      border: 1px solid rgba(148, 163, 184, 0.17);
      border-radius: 11px;
      padding: 10px;
    }

    .feature small {
      display: block;
      color: #94a3b8;
      margin-bottom: 4px;
      font-size: 11px;
    }

    .feature strong {
      color: white;
      font-size: 14px;
      line-height: 1.25;
    }

    .seller-card {
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.10), transparent 36%),
        rgba(11, 18, 32, 0.96);
      border: 1px solid rgba(34, 197, 94, 0.18);
      border-radius: 15px;
      padding: 15px;
    }

    .seller-card h3 {
      margin-top: 0;
      font-size: 18px;
    }

    .seller-card p {
      color: #dbeafe;
      line-height: 1.55;
      font-size: 14px;
    }

    .seller-actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .seller-actions button,
    .seller-actions a {
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    .map-box {
      height: 270px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #1f2937;
    }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .similar-card {
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .similar-card:hover {
      transform: translateY(-5px);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .similar-card img {
      width: 100%;
      height: 130px;
      object-fit: cover;
    }

    .similar-card div {
      padding: 10px;
    }

    @media (max-width: 950px) {
      .object-info-grid {
        grid-template-columns: 1fr;
      }

      .object-title-row {
        grid-template-columns: 1fr;
      }

      .object-price {
        width: fit-content;
        text-align: left;
      }

      .gallery-main {
        height: 44vh;
        min-height: 280px;
      }
    }

    @media (max-width: 620px) {
      .object-shell {
        margin: 2px auto 18px;
        padding: 0 8px;
      }

      .object-title-row h1 {
        font-size: 13px;
      }

      .object-price {
        width: fit-content;
        font-size: 13px;
        text-align: left;
      }

      .gallery-main {
        height: 38vh;
        min-height: 240px;
        border-radius: 13px;
      }

      .gallery-btn {
        width: 30px;
        height: 30px;
        font-size: 18px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      .thumbs img {
        width: 66px;
        height: 44px;
      }

      .object-box,
      .seller-card {
        padding: 13px;
        border-radius: 13px;
      }
    }
  </style>
</head>

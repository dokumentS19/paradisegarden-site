<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Обʼєкт нерухомості — АН «Райський Сад»</title>

  <link rel="stylesheet" href="../styles.css">

  <style>
    .object-shell {
      max-width: 1200px;
      margin: 34px auto;
      padding: 0 16px;
    }

    .object-page {
      display: grid;
      gap: 24px;
    }

    .object-hero-card {
      background:
        linear-gradient(180deg, rgba(30, 41, 59, 0.94), rgba(15, 23, 42, 0.94));
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 26px;
      padding: 26px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
    }

    .object-title-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .object-title-row h1 {
      margin: 10px 0 0;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.1;
    }

    .object-price {
      color: #22c55e;
      font-size: clamp(26px, 4vw, 42px);
      font-weight: 900;
      white-space: nowrap;
    }

    .gallery {
      display: grid;
      gap: 14px;
    }

  .gallery-main {
  position: relative;
  width: 100%;
  max-height: 720px;
  border-radius: 24px;
  overflow: hidden;
  background: #020617;
  border: 1px solid rgba(148, 163, 184, 0.22);
  display: flex;
  align-items: center;
  justify-content: center;
    }

.gallery-main img {
  width: 100%;
  height: auto;
  max-height: 720px;
  object-fit: contain;
  display: block;
  user-select: none;
}
.gallery-main {
  position: relative;
  height: 525px;
  border-radius: 24px;
  overflow: hidden;
  background: #020617;
  border: 1px solid rgba(148, 163, 184, 0.22);
  display: flex;
  align-items: center;
  justify-content: center;
}
    .gallery-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.24);
      background: rgba(2, 6, 23, 0.62);
      color: white;
      font-size: 34px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
    }

    .gallery-btn:hover {
      background: rgba(34, 197, 94, 0.6);
      transform: translateY(-50%) scale(1.08);
    }

    .gallery-btn.left {
      left: 16px;
    }

    .gallery-btn.right {
      right: 16px;
    }

    .counter {
      position: absolute; 
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(2, 6, 23, 0.7);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      backdrop-filter: blur(12px);
      font-size: 14px;
    }

    .thumbs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 2px 8px;
    }

    .thumbs img {
      width: 112px;
      height: 82px;
      object-fit: contain;
      border-radius: 12px;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.72;
      transition: 0.25s ease;
      flex: 0 0 auto;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: #22c55e;
      transform: translateY(-2px);
    }

    .object-info-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
    }

    .object-box {
      background:
        linear-gradient(180deg, rgba(30, 41, 59, 0.94), rgba(15, 23, 42, 0.94));
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.28);
    }

    .object-box h2,
    .object-box h3 {
      margin-top: 0;
    }

    .object-description {
      color: #e2e8f0;
      line-height: 1.8;
      white-space: pre-line;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .feature {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 16px;
      padding: 14px;
    }

    .feature small {
      display: block;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .feature strong {
      color: white;
      font-size: 17px;
    }

    .seller-card {
      background:
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.18), transparent 38%),
        rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(34, 197, 94, 0.24);
      border-radius: 24px;
      padding: 24px;
    }

    .seller-card h3 {
      margin-top: 0;
    }

    .seller-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .seller-actions button,
    .seller-actions a {
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    .map-box {
      height: 360px;
      border-radius: 22px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.22);
      background: #020617;
    }

    .similar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
    }

    .similar-card {
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 18px;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .similar-card:hover {
      transform: translateY(-5px);
      border-color: rgba(34, 197, 94, 0.5);
    }

    .similar-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .similar-card div {
      padding: 12px;
    }

    .back-link {
      display: inline-flex;
      text-decoration: none;
      color: #bbf7d0;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.24);
    }

    .status-line {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .pill {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.14);
      border: 1px solid rgba(34, 197, 94, 0.28);
      color: #bbf7d0;
      font-size: 13px;
    }

    @media (max-width: 950px) {
      .object-title-row,
      .object-info-grid {
        grid-template-columns: 1fr;
        display: grid;
      }

      .object-price {
        white-space: normal;
      }

      .gallery-main {
        height: 440px;
      }
    }

    @media (max-width: 620px) {
      .object-hero-card,
      .object-box,
      .seller-card {
        padding: 18px;
        border-radius: 20px;
      }

      .gallery-main {
        height: 320px;
        border-radius: 18px;
      }

      .gallery-btn {
        width: 44px;
        height: 44px;
        font-size: 28px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="topbar">
  <a href="../index.html" class="brand">
    <span class="brand-icon">🌿</span>
    <span>
      <strong>Райський Сад</strong>
      <small>Обʼєкт нерухомості</small>
    </span>
  </a>

  <nav class="nav">
   <a href="../index.html">🏠 Головна</a>
   <a href="../favorites.html">❤️ Обране</a>
  <a href="../dashboard.html">👤 Кабінет</a>
  <a href="../admin.html">⚙️ Адмін</a>
  </nav>
</header>

<main class="object-shell">
  <div id="objectPage" class="object-page">
    <section class="object-hero-card">
      <p>Завантаження обʼєкта...</p>
    </section>
  </div>
</main>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCrWP2WuQloBOErhfB4zrh1GWgd90BCI2I"></script>
<script type="module" src="object.js"></script>

</body>
</html>

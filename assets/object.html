<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Обʼєкт нерухомості — Райський Сад</title>

  <link rel="stylesheet" href="../styles.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #07150f;
      color: #ffffff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .object-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(5, 24, 17, 0.96);
      border-bottom: 1px solid rgba(217, 135, 30, 0.22);
    }

    .object-nav {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f3a334, #d9871e);
      color: #fff;
      font-weight: 900;
    }

    .brand-title {
      display: block;
      font-weight: 900;
      font-size: 20px;
      line-height: 1.1;
    }

    .brand-subtitle {
      display: block;
      color: #c8d0cc;
      font-size: 13px;
      margin-top: 2px;
    }

    .object-menu {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-weight: 700;
      font-size: 14px;
    }

    .object-menu a:hover {
      color: #f3a334;
    }

    .object-shell {
      max-width: 1180px;
      margin: 18px auto 46px;
      padding: 0 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(217, 135, 30, 0.15);
      border: 1px solid rgba(217, 135, 30, 0.35);
      color: #ffd89b;
      font-weight: 800;
      font-size: 14px;
    }

    .object-card {
      background: linear-gradient(180deg, rgba(12, 36, 27, 0.98), rgba(5, 22, 16, 0.98));
      border: 1px solid rgba(217, 135, 30, 0.32);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    .object-top {
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
    }

    .label {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(217, 135, 30, 0.18);
      border: 1px solid rgba(217, 135, 30, 0.35);
      color: #ffe0b2;
      font-size: 13px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 42px);
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .object-price {
      padding: 14px 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #f3a334, #d9871e);
      color: #fff;
      font-size: clamp(20px, 2.2vw, 30px);
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 16px 36px rgba(217, 135, 30, 0.25);
    }

    .status-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .pill {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.09);
      color: #e9efec;
      font-size: 13px;
      font-weight: 700;
    }

    .gallery {
      padding: 0 24px 24px;
    }

    .gallery-main {
      width: 100%;
      min-height: 420px;
      max-height: 620px;
      border-radius: 20px;
      overflow: hidden;
      background: #061811;
      border: 1px solid rgba(217, 135, 30, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      max-height: 620px;
      object-fit: contain;
      object-position: center;
      display: block;
      background: #061811;
    }

    .thumbs {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .thumbs img {
      width: 90px;
      height: 62px;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.72;
      transition: 0.2s ease;
      flex: 0 0 auto;
    }

    .thumbs img:hover,
    .thumbs img.active {
      opacity: 1;
      border-color: #f3a334;
      transform: translateY(-2px);
    }

    .object-info-grid {
      max-width: 1180px;
      margin: 18px auto 0;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) 360px;
      gap: 18px;
    }

    .object-box,
    .seller-card {
      background: linear-gradient(180deg, rgba(12, 36, 27, 0.98), rgba(5, 22, 16, 0.98));
      border: 1px solid rgba(217, 135, 30, 0.28);
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
    }

    .object-box h2,
    .seller-card h3 {
      margin-top: 0;
      font-size: 24px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }

    .feature {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .feature small {
      display: block;
      color: #aebbb6;
      margin-bottom: 5px;
      font-size: 13px;
    }

    .feature strong {
      color: white;
      font-size: 16px;
      line-height: 1.25;
    }

    .object-description {
      color: #dbe5e0;
      line-height: 1.7;
      white-space: pre-line;
      font-size: 16px;
    }

    .seller-card p {
      color: #c8d0cc;
      line-height: 1.6;
    }

    .seller-actions {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .seller-actions a {
      display: block;
      width: 100%;
      text-align: center;
      padding: 13px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, #f3a334, #d9871e);
      color: white;
      font-weight: 900;
    }

    .empty-state {
      background: rgba(12, 36, 27, 0.98);
      border: 1px solid rgba(217, 135, 30, 0.28);
      border-radius: 22px;
      padding: 28px;
    }

    @media (max-width: 960px) {
      .object-top {
        grid-template-columns: 1fr;
      }

      .object-price {
        width: fit-content;
      }

      .object-info-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .object-nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .object-top,
      .gallery,
      .object-box,
      .seller-card {
        padding: 18px;
      }

      .gallery-main {
        min-height: 280px;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>

<header class="object-header">
  <nav class="object-nav">
    <a href="../index.html" class="brand">
      <span class="brand-logo">РС</span>
      <span>
        <span class="brand-title">Райський Сад</span>
        <span class="brand-subtitle">Обʼєкт нерухомості</span>
      </span>
    </a>

    <div class="object-menu">
      <a href="../index.html">Головна</a>
      <a href="../index.html#objects">Обʼєкти</a>
      <a href="../index.html#contacts">Контакти</a>
    </div>
  </nav>
</header>

<main class="object-shell">
  <a class="back-link" href="../index.html#objects">← Назад до обʼєктів</a>

  <div id="objectPage">
    <section class="object-card">
      <div class="object-top">
        <div>
          <span class="label">Завантаження</span>
          <h1>Завантаження обʼєкта...</h1>
        </div>
      </div>
    </section>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBq_bUWieO6UI7REfU1iNrk2RK2EjQGnts",
    authDomain: "paradisegarden-site.firebaseapp.com",
    projectId: "paradisegarden-site",
    storageBucket: "paradisegarden-site.firebasestorage.app",
    messagingSenderId: "452352075250",
    appId: "1:452352075250:web:049e1b3f10c44bc04c776b",
    measurementId: "G-6XHWE6Y0JE"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const COMPANY_PHONE_VISIBLE = "0953777196";
  const COMPANY_PHONE_TEL = "+380953777196";

  const objectPage = document.getElementById("objectPage");

  const params = new URLSearchParams(window.location.search);
  const objectId = params.get("id");

  function escapeHtml(value = "") {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatPrice(value, dealType = "sale") {
    const n = Number(value);

    if (!Number.isFinite(n) || n <= 0) {
      return "Ціну не вказано";
    }

    const currency = dealType === "rent" ? "грн" : "$";

    return `${new Intl.NumberFormat("uk-UA").format(n)} ${currency}`;
  }

  function getDealTypeName(value) {
    return {
      sale: "Продаж",
      rent: "Оренда"
    }[value] || "Не вказано";
  }

  function getPropertyTypeName(value) {
    return {
      apartment: "Квартира",
      house: "Будинок",
      land: "Земельна ділянка",
      garage: "Гараж",
      commercial: "Комерція"
    }[value] || "Не вказано";
  }

  function getCommercialTypeName(value) {
    return {
      office: "Офіс",
      hangar: "Ангар",
      warehouse: "Склад",
      shop: "Магазин",
      production: "Виробниче приміщення",
      other: "Інше"
    }[value] || "";
  }

  function getImages(item) {
    if (Array.isArray(item.images) && item.images.length > 0) {
      return item.images.filter(Boolean);
    }

    return [
      "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80"
    ];
  }

  function renderGallery(images) {
    return `
      <div class="gallery">
        <div class="gallery-main">
          <img id="mainObjectImage" src="${escapeHtml(images[0])}" alt="Фото обʼєкта              src="${escapeHtml(image)}"
                    alt="Фото ${index + 1}"
                    class="${index === 0 ? "active" : ""}"
                    data-image="${escapeHtml(image)}"
                 humb.addEventListener("click", () => {
        const mainImage = document.getElementById("mainObjectImage");
        const newSrc = thumb.dataset.image;

        if (mainImage && newSrc) {
          mainImage.src = newSrc;
        }

        document.querySelectorAll(".thumbs img").forEach(img => {
          img.classList.remove("active");
        });

        thumb.classList.add("active");
      });
    });
  }

  function renderObject(item) {
    const title = escapeHtml(item.title || "Обʼєкт нерухомості");
    const description = escapeHtml(item.description || "Опис обʼєкта поки не додано.");
    const price = formatPrice(item.price, item.dealType);
    const area = escapeHtml(item.area || "Не вказано");
    const address = escapeHtml(item.address || item.location || "Не вказано");
    const dealName = escapeHtml(getDealTypeName(item.dealType));
    const propertyName = escapeHtml(getPropertyTypeName(item.propertyType));
    const commercialName = escapeHtml(getCommercialTypeName(item.commercialType));
    const status = item.status === "sold" ? "Продано" : "Активне";
    const views = Number(item.views || 0);
    const images = getImages(item);

    document.title = `${title} — Райський Сад`;

    objectPage.innerHTML = `
      <section class="object-card">
        <div class="object-top">
          <div>
            <span class="label">${dealName}</span>
            <h1>${title}</h1>

            <div class="status-line">
              <span class="pill">✅ ${escapeHtml(status)}</span>
              <span class="pill">🏷️ ${propertyName}</span>
              ${commercialName ? `<span class="pill">📌 ${commercialName}</span>` : ""}
              <span class="pill">👁 Переглядів: ${views}</span>
            </div>
          </div>

          <div class="object-price">${price}</div>
        </div>

        ${renderGallery(images)}
      </section>

      <section class="object-info-grid">
        <div class="object-box">
          <h2>Інформація про обʼєкт</h2>

          <div class="feature-grid">
            <div class="feature">
              <small>Тип угоди</small>
              <strong>${dealName}</strong>
            </div>

            <div class="feature">
              <small>Тип нерухомості</small>
              <strong>${propertyName}</strong>
            </div>

            <div class="feature">
              <small>Площа</small>
              <strong>${area}</strong>
            </div>

            <div class="feature">
              <small>Адреса / локація</small>
              <strong>${address}</strong>
            </div>
          </div>

          <h2>Опис</h2>
          <div class="object-description">${description}</div>
        </div>

        <aside class="seller-card">
          <h3>Звʼязатися щодо обʼєкта</h3>

          <p>
            Якщо цей обʼєкт Вас зацікавив, зателефонуйте нам або напишіть у месенджер.
          </p>

          <div class="seller-actions">
            <a href="tel:${COMPANY_PHONE_TEL}нити ${COMPANY_PHONE_VISIBLE}</a>
            <a href="https://t.me/paradisegarden_leads_bot" target="_blank" rel="noopener noreferrerumber3777196💜 Viber</a>
          </div>
        </aside>
      </section>
    `;

    activateGallery();
  }

  async function loadObject() {
    if (!objectId) {
      objectPage.innerHTML = `
        <div class="empty-state">
          <h2>Обʼєкт не знайдено</h2>
          <p>У посиланні немає ID обʼєкта.</p>
          <a class="back-link" href="../index.html#objects     </div>
      `;
      return;
    }

    try {
      const objectRef = doc(db, "objects", objectId);
      const objectSnap = await getDoc(objectRef);

      if (!objectSnap.exists()) {
        objectPage.innerHTML = `
          <div class="empty-state">
            <h2>Обʼєкт не знайдено</h2>
            <p>Можливо, оголошення видалене або ID неправильний.</p>
            <a class="back-link" href="../index.html#objects       </div>
        `;
        return;
      }

      renderObject({
        id: objectSnap.id,
        ...objectSnap.data()
      });

    } catch (error) {
      console.error("OBJECT LOAD ERROR:", error);

      objectPage.innerHTML = `
        <div class="empty-state">
          <h2>Помилка завантаження</h2>
          <p>Не вдалося завантажити дані обʼєкта. Перевірте Firebase або правила доступу.</p>
          <a class="back-link" href="../index.html#objects     </div>
      `;
    }
  }

  loadObject();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM — заявки</title>

  <link rel="stylesheet" href="styles.css">

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ✅ HEADER -->
<header class="topbar">
  <h2>📋 CRM — Заявки</h2>

  <div class="actions">
    <a href="index.html">🏠 Головна</a>
  </div>
</header>

<!-- ✅ АНАЛІТИКА -->
<section class="about">
  <h2>📊 Аналітика</h2>

  <div id="stats"></div>

  <!-- ✅ ГРАФІК -->
  <canvas id="leadsChart" height="120"></canvas>
</section>

<!-- ✅ ПОШУК -->
<section class="about">
  <h2>🔍 Пошук</h2>

  <input 
    id="searchLead" 
    placeholder="Введи імʼя або телефон" 
    oninput="searchLead()" 
    style="width:100%; padding:10px;"
  >
</section>

<!-- ✅ ФІЛЬТРИ -->
<section class="about">
  <h2>📂 Фільтр</h2>

  <button onclick="filterStatus('all')" class="btn">Усі</button>
  <button onclick="filterStatus('new')" class="btn">Нові</button>
  <button onclick="filterStatus('done')" class="btn">Оброблені</button>
</section>

<!-- ✅ СПИСОК ЗАЯВОК -->
<section class="objects">
  <h2>📋 Список заявок</h2>

  <div id="leads"></div>
</section>

<!-- ✅ JS -->
<script type="module" src="leads.js"></script>

</body>
</html>

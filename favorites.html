  <style>
    .favorites-shell {
      max-width: 1200px;
      margin: 28px auto 34px;
      padding: 0 16px;
    }

    .favorites-hero {
      background:
        linear-gradient(135deg, rgba(7, 92, 43, 0.22), rgba(149, 87, 31, 0.16)),
        rgba(13, 25, 22, 0.96);
      border: 1px solid rgba(232, 137, 18, 0.20);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.30);
      margin-bottom: 22px;
    }

    .favorites-hero h1 {
      margin: 12px 0 10px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.1;
    }

    .favorites-hero p {
      color: #dbeafe;
      line-height: 1.65;
      max-width: 780px;
      margin-bottom: 0;
    }

    .favorites-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      background: rgba(8, 21, 15, 0.82);
      border: 1px solid rgba(232, 137, 18, 0.18);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.22);
    }

    .favorites-toolbar input {
      max-width: 420px;
    }

    .favorites-toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .fav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
      gap: 24px;
    }

    .fav-card {
      position: relative;
      overflow: hidden;
      background: rgba(8, 21, 15, 0.86);
      border: 1px solid rgba(232, 137, 18, 0.18);
      border-radius: 20px;
      color: white;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      transition: 0.3s ease;
    }

    .fav-card:hover {
      transform: translateY(-7px);
      border-color: rgba(232, 137, 18, 0.46);
      box-shadow:
        0 24px 65px rgba(0, 0, 0, 0.42),
        0 0 28px rgba(232, 137, 18, 0.12);
    }

    .fav-card a {
      color: white;
      text-decoration: none;
      display: block;
    }

    .fav-card-img {
      position: relative;
      height: 220px;
      overflow: hidden;
      background: #08150f;
    }

    .fav-card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.45s ease;
    }

    .fav-card:hover .fav-card-img img {
      transform: scale(1.06);
    }

    .fav-card-body {
      padding: 18px;
    }

    .fav-card-body h3 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
    }

    .fav-card-body p {
      color: #dbeafe;
      margin: 8px 0;
    }

    .fav-price {
      color: #4ade80;
      font-size: 22px;
      font-weight: 850;
      margin-top: 12px;
    }

    .remove-fav {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 4;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(4, 20, 13, 0.76);
      color: white;
      font-size: 20px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: 0.25s ease;
    }

    .remove-fav:hover {
      background: rgba(220, 38, 38, 0.86);
      transform: scale(1.08);
    }

    .empty-favs {
      background: rgba(8, 21, 15, 0.84);
      border: 1px solid rgba(232, 137, 18, 0.18);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      color: #dbeafe;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.26);
    }

    .empty-favs h2 {
      color: white;
      margin-top: 0;
    }

    @media (max-width: 680px) {
      .favorites-shell {
        margin: 20px auto 28px;
        padding: 0 12px;
      }

      .favorites-hero {
        padding: 18px;
      }

      .favorites-hero h1 {
        font-size: 32px;
      }

      .favorites-toolbar {
        align-items: stretch;
      }

      .favorites-toolbar input,
      .favorites-toolbar button {
        width: 100%;
        max-width: none;
      }

      .favorites-toolbar-actions {
        width: 100%;
      }

      .fav-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

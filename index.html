<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>АН «Райський Сад»</title>

<style>

/* ===== BASE ===== */
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f6f8;
}

/* ===== BUTTON ===== */
button {
  border: none;
  padding: 10px 14px;
  border-radius: 12px;
  background: #1f6f43;
  color: #fff;
  cursor: pointer;
  transition: .2s;
}
button:hover {
  transform: translateY(-2px);
}

/* ===== INPUT ===== */
input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* ===== GRID ===== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap: 20px;
}

/* ===== CARD ===== */
.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  padding: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,.1);
  transition: .25s;
}
.card:hover {
  transform: translateY(-5px) scale(1.02);
}

.gallery-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.fav-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: white;
  border-radius: 50%;
  padding: 5px;
}

/* ===== MODAL ===== */
.modal { display:none; position:fixed; inset:0; }
.modal.active { display:block; }

.modal-backdrop {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter: blur(10px);
}

.modal img {
  max-width:80%;
  max-height:80%;
  transform:scale(.8);
  opacity:0;
  transition:.3s;
}
.modal.active img {
  transform:scale(1);
  opacity:1;
}

.modal-content {
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal button {
  position:absolute;
  font-size:28px;
}

#galClose { top:20px; right:20px; }
#galPrev { left:20px; top:50%; }
#galNext { right:20px; top:50%; }

/* skeleton */
.skeleton {
  height:200px;
  border-radius:12px;
  background:linear-gradient(90deg,#eee,#ddd,#eee);
  animation: sk 1s infinite;
}
@keyframes sk {
  0% { background-position:100% }
  100% { background-position:-100% }
}

</style>
</head>

<body>

<h2>Об'єкти</h2>

<!-- ФІЛЬТРИ -->
<div style="display:flex; gap:10px; flex-wrap:wrap;">
  <input id="searchInput" placeholder="Пошук">
  <input id="priceFilter" placeholder="Ціна до">
  <button id="resetFilters">Скинути</button>
</div>

<div>❤️ Обрані: <span id="favCount">0</span></div>

<!-- ОБ'ЄКТИ -->
<div id="objectsGrid" class="cards">
  <div class="skeleton"></div>
  <div class="skeleton"></div>
</div>

<!-- КОНТАКТИ -->
<div>
  <a id="viberLink">Viber</a>
  <a id="tgLink">Telegram</a>
</div>

<!-- CRM -->
<form id="leadForm">
  <input name="name" placeholder="Ім’я" required>
  <input name="phone" placeholder="Телефон" required>
  <button>Надіслати</button>
</form>

<!-- ГАЛЕРЕЯ -->
<div id="galleryModal" class="modal">
  <div class="modal-backdrop"></div>

  <div class="modal-content">
    <button id="galClose">×</button>
    <button id="galPrev">‹</button>

    <img id="modalImg">

    <button id="galNext">›</button>
  </div>
</div>

<script type="module" src="script.js"></script>

<script>

// ===== Пошук =====
document.getElementById("searchInput").oninput = e => {
  const v = e.target.value.toLowerCase();

  document.querySelectorAll(".card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(v) ? "block" : "none";
  });
};

// ===== Ціна =====
document.getElementById("priceFilter").oninput = e => {
  const max = +e.target.value;

  document.querySelectorAll(".card").forEach(c => {
    const price = +c.innerText.match(/\d+/)?.[0];
    c.style.display = !max || price <= max ? "block" : "none";
  });
};

document.getElementById("resetFilters").onclick = () => location.reload();

// ===== Фаворити =====
document.addEventListener("click", e => {
  const btn = e.target.closest(".fav-btn");
  if (!btn) return;

  let favs = JSON.parse(localStorage.getItem("favs") || "[]");
  const id = +btn.dataset.id;

  favs = favs.includes(id)
    ? favs.filter(x => x !== id)
    : [...favs, id];

  localStorage.setItem("favs", JSON.stringify(favs));
  document.getElementById("favCount").textContent = favs.length;
});

// ===== CRM =====
document.getElementById("leadForm").onsubmit = e => {
  e.preventDefault();
  alert("✅ Заявка відправлена");
  e.target.reset();
};

</script>

</body>
</html>
``

<!-- ✅ Firebase + MAPS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ✅ ВСТАВ СВІЙ FIREBASE KEY
const firebaseConfig = {
  apiKey: "ТУТ_FIREBASE_KEY",
  authDomain: "paradisegarden-site.firebaseapp.com",
  projectId: "paradisegarden-site",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let map;

// ✅ ІНІЦІАЛІЗАЦІЯ КАРТИ
window.initMap = async function () {

  const center = { lat: 50.5215, lng: 30.2506 };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: center
  });

  loadObjects();
};

// ✅ ЗАВАНТАЖЕННЯ ОБʼЄКТІВ
async function loadObjects() {

  const snap = await getDocs(collection(db, "objects"));

  snap.forEach(doc => {
    const d = doc.data();

    // якщо немає координат — пропускаємо
    if (!d.lat || !d.lng) return;

    const marker = new google.maps.Marker({
      position: { lat: d.lat, lng: d.lng },
      map: map
    });

    const info = new google.maps.InfoWindow({
      content: `
        <div style="color:black;">
          <strong>${d.title || "Без назви"}</strong><br>
          💰 ${d.price || "-"} $
        </div>
      `
    });

    marker.addListener("click", () => {
      info.open(map, marker);
    });

  });
}
</script>

<!-- ✅ GOOGLE MAPS -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=ТУТ_GOOGLE_MAPS_KEY&callback=initMap">
</script>

</body>
</html>

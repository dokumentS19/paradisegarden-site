<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SaaS CRM PRO</title>

<style>
body{font-family:Arial;background:#f5f6f8;padding:20px}
.section{background:#fff;padding:15px;border-radius:12px;margin-bottom:20px}
input{width:100%;padding:10px;margin-bottom:10px}
button{padding:10px;background:#1f6f43;color:#fff;border:none;border-radius:8px}
.adminOnly{display:none}
</style>
</head>

<body>

<h1>🚀 SaaS CRM PRO</h1>

<div id="authBox" class="section">
<input id="email" placeholder="Email">
<input id="password" type="password">
<button id="login">Login</button>
<button id="register">Register</button>
</div>

<div class="section adminOnly">
<h3>Додати обʼєкт</h3>
<input id="title">
<input id="price">
<input type="file" id="image" multiple>
<button id="add">Додати</button>
</div>

<div class="section">
<h3>📊 Dashboard</h3>
<div id="stats"></div>
</div>

<div class="section">
<h3>Обʼєкти</h3>
<div id="objects"></div>
</div>

<div class="section">
<h3>CRM клієнти</h3>
<div id="leads"></div>
</div>

<div class="section">
<h3>Заявка → Telegram</h3>
<form id="leadForm">
<input name="name">
<input name="phone">
<button>Send</button>
</form>
</div>

<div class="section">
<h3>Підписка</h3>
<button id="buy">Activate PRO</button>
</div>

<button onclick="logout()">Logout</button>

<script type="module">

// ✅ Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
 getAuth, signInWithEmailAndPassword,
 createUserWithEmailAndPassword,
 onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
 getFirestore, collection, addDoc,
 getDocs, query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
 getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// ✅ CONFIG (твій)
const app = initializeApp({
 apiKey:"ТУТ_СВІЙ_API_KEY",
 authDomain:"paradisegarden-site.firebaseapp.com",
 projectId:"paradisegarden-site",
 storageBucket:"paradisegarden-site.firebasestorage.app"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// ===== GLOBAL =====
let agencyId = null;

// ===== LOGIN =====
login.onclick = async () => {
 await signInWithEmailAndPassword(auth, email.value, password.value);
};

register.onclick = async () => {
 const u = await createUserWithEmailAndPassword(auth, email.value, password.value);
 agencyId = u.user.uid;

 await addDoc(collection(db,"users"),{
  uid: u.user.uid,
  agencyId,
  role: "admin"
 });
};

// ===== AUTH =====
onAuthStateChanged(auth, async user => {
 if(!user) return;

 const snap = await getDocs(query(
  collection(db,"users"),
  where("uid","==",user.uid)
 ));

 snap.forEach(d=>{
  agencyId = d.data().agencyId;
 });

 document.getElementById("authBox").style.display="none";
 document.querySelectorAll(".adminOnly").forEach(e=>e.style.display="block");

 loadAll();
});

// ===== ADD OBJECT =====
add.onclick = async () => {

 if(!title.value || !price.value){
  alert("Заповни поля");
  return;
 }

 let imgs = [];

 for(const f of image.files){
  const r = ref(storage,"img/"+Date.now()+f.name);
  await uploadBytes(r,f);
  imgs.push(await getDownloadURL(r));
 }

 await addDoc(collection(db,"objects"),{
  agencyId,
  title:title.value,
  price:price.value,
  images:imgs
 });

 alert("✅ Додано");
 loadObjects();
};

// ===== OBJECTS =====
async function loadObjects(){
 const snap = await getDocs(query(
  collection(db,"objects"),
  where("agencyId","==",agencyId)
 ));

 objects.innerHTML="";
 snap.forEach(d=>{
  let o=d.data();
  objects.innerHTML += `<div>${o.title} — ${o.price}$</div>`;
 });
}

// ===== LEADS =====
async function loadLeads(){
 const snap = await getDocs(query(
  collection(db,"leads"),
  where("agencyId","==",agencyId)
 ));

 leads.innerHTML="";
 snap.forEach(d=>{
  let l=d.data();
  leads.innerHTML += `<div>${l.name} ${l.phone}</div>`;
 });
}

// ===== STATS =====
async function loadStats(){
 const a = await getDocs(query(collection(db,"objects"),where("agencyId","==",agencyId)));
 const l = await getDocs(query(collection(db,"leads"),where("agencyId","==",agencyId)));

 stats.innerHTML = `Обʼєкти: ${a.size}<br>Ліди: ${l.size}`;
}

function loadAll(){
 loadObjects();
 loadLeads();
 loadStats();
}

// ===== TELEGRAM =====
leadForm.onsubmit = async (e)=>{
 e.preventDefault();

 const data = Object.fromEntries(new FormData(leadForm));
 data.agencyId = agencyId;

 await addDoc(collection(db,"leads"),data);

 // ⚠️ ВСТАВ СВОЄ
 fetch(`https://api.telegram.org/botYOUR_TOKEN/sendMessage`,{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    chat_id:"YOUR_CHAT_ID",
    text:`🔥 ЛІД\n${data.name}\n${data.phone}`
  })
 });

 alert("✅ Відправлено");
};

// ===== PAYMENT =====
buy.onclick = ()=> alert("💳 Підключи Stripe/LiqPay тут");

// ===== LOGOUT =====
window.logout = ()=>signOut(auth).then(()=>location.reload());

</script>

</body>
</html>

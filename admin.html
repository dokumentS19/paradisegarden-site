<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Адмінка</title>
</head>
<body>

<h2>Додати об'єкт</h2>

<input id="title" placeholder="Назва"><br><br>
<input id="area" placeholder="Площа"><br><br>
<input id="price" placeholder="Ціна"><br><br>
<input type="file" id="image" multiple>

<button onclick="addObject()">Додати</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyB7Uu7Iq6X0471orSFgorzwwIqP5JMJeGk",
  authDomain: "paradisegarden-site.firebaseapp.com",
  projectId: "paradisegarden-site"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addObject = async () => {
console.log("FUNC START");
  const title = document.getElementById("title").value;
  const area = document.getElementById("area").value;
  const price = document.getElementById("price").value;

  const files = document.getElementById("image").files;

  if (!title || !price || files.length === 0) {
    alert("Заповни всі поля і вибери фото");
    return;
  }

  let images = [];

  const readFile = (file) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);  
    });
  };

  // ✅ читаємо всі файли
 // for (let i = 0; i < files.length; i++) {
   // const img = await readFile(files[i]);
   // images.push(img);
  }

  // ✅ записуємо масив фото
  await addDoc(collection(db, "objects"), {
    title,
    area,
    price,
 images,
    createdAt: new Date()
  });

  alert("✅ Об’єкт додано!");

  document.getElementById("title").value = "";
  document.getElementById("area").value = "";
  document.getElementById("price").value = "";
  document.getElementById("image").value = "";
};

</script>

</body>
</html>

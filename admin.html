<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Адмінка</title>
</head>
<body>

<h2>Додати об'єкт</h2>

<input id="title" placeholder="Назва"><br><br>
<input id="area" placeholder="Площа"><br><br>
<input id="price" placeholder="Ціна"><br><br>
<input type="file" id="image">

<button onclick="addObject()">Додати</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyB7Uu7Iq6X0471orSFgorzwwIqP5JMJeGk",
  authDomain: "paradisegarden-site.firebaseapp.com",
  projectId: "paradisegarden-site"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addObject = async () => {

const title = document.getElementById("title").value;
const area = document.getElementById("area").value;
const price = document.getElementById("price").value;

const file = document.getElementById("image").files[0];
const image = file ? file.name : "";

await addDoc(collection(db, "objects"), {
  title,
  area,
  price,
  image
});

alert("✅ Об’єкт додано!");
};
</script>

</body>
</html>

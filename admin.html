<!DOCTYPE html>
<html lang="uk">
<head> 
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Адмін</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #preview {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    #preview img {
      width: 100px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h2>Додати об'єкт</h2>

<label>Назва</label><br>
<input id="title"><br><br>

<label>Площа</label><br>
<input id="area"><br><br>

<label>Ціна</label><br>
<input id="price"><br><br>

<label>Фото</label><br>
<input type="file" id="file" multiple><br>

<div id="preview"></div>

<br>
<button onclick="addObject()">Додати</button>

<script type="module" src="admin.js"></script>

</body>
</html>
